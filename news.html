<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Takashi Creater | News</title>
<meta name="keywords" content="news, ニュース, RSS">
<meta name="description" content="最新ニュース">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: #f5f5f5;
  color: #333;
}
.news-app {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 40px 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  text-align: center;
}
.header h1 {
  font-size: 32px;
  font-weight: 300;
  margin-bottom: 8px;
}
.header p {
  font-size: 14px;
  opacity: 0.9;
}
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.control-btn {
  padding: 12px 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s;
}
.control-btn:hover {
  background: #f0f0f0;
  border-color: #667eea;
  color: #667eea;
}
.control-btn.active {
  background: #667eea;
  color: white;
  border-color: #667eea;
}
.loading, .error {
  text-align: center;
  padding: 60px 20px;
  font-size: 16px;
}
.error {
  color: #b00;
  background: rgba(255, 50, 50, 0.1);
  border-radius: 8px;
  margin: 20px;
}
.news-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.news-item {
  background: white;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  transition: all 0.3s;
  cursor: pointer;
  display: block;
  text-decoration: none;
  color: inherit;
}
.news-item:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
  transform: translateY(-2px);
}
.news-source {
  font-size: 12px;
  color: #999;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.news-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
  color: #333;
}
.news-description {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.news-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: #999;
}
.news-time {
  display: flex;
  align-items: center;
  gap: 4px;
}
.read-more {
  color: #667eea;
  font-weight: 500;
}
.back-link {
  text-align: center;
  margin-top: 30px;
  padding: 20px;
}
.back-link a {
  color: #667eea;
  text-decoration: none;
  font-size: 16px;
  padding: 12px 24px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 20px;
  display: inline-block;
  transition: all 0.3s;
}
.back-link a:hover {
  background: #667eea;
  color: white;
  border-color: #667eea;
}
</style>
</head>
<body>
<div class="news-app">
  <div class="header">
    <h1>ニュース</h1>
    <p>最新のニュースをチェック</p>
  </div>
  
  <div class="controls">
    <button class="control-btn active" data-source="nhk">NHK</button>
    <button class="control-btn" data-source="yomiuri">読売新聞</button>
    <button class="control-btn" data-source="asahi">朝日新聞</button>
    <button class="control-btn" data-source="mainichi">毎日新聞</button>
  </div>
  
  <div id="news-display" class="loading">
    ニュースを読み込み中...
  </div>
  
  <div style="text-align: center; margin-top: 30px; padding: 20px;">
    <p style="font-size: 14px; color: #999; margin-bottom: 20px;">
      ※ RSS フィード取得に時間がかかる場合があります
    </p>
    <a href="home.html" style="color: white; text-decoration: none; font-size: 16px; padding: 12px 24px; background: #667eea; border-radius: 20px; display: inline-block; transition: all 0.3s;" onmouseover="this.style.background='#764ba2'" onmouseout="this.style.background='#667eea'">← ホームへ戻る</a>
  </div>
</div>

<script>
const rssFeeds = {
  nhk: 'https://www.nhk.or.jp/rss/news/news.xml',
  yomiuri: 'https://rss.yomiuri.co.jp/rss/news_rss.xml',
  asahi: 'https://www.asahi.com/rss/asahi/newsheadlines.xml',
  mainichi: 'https://rss.mainichi.jp/rss/news/newsindex_main.xml'
};

const sourceNames = {
  nhk: 'NHK',
  yomiuri: '読売新聞',
  asahi: '朝日新聞',
  mainichi: '毎日新聞'
};

let currentSource = 'nhk';

// ボタンのイベントリスナー
document.querySelectorAll('.control-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentSource = e.target.dataset.source;
    fetchNews(currentSource);
  });
});

async function fetchNews(source) {
  const display = document.getElementById('news-display');
  display.innerHTML = '<div class="loading">ニュースを読み込み中...</div>';
  
  try {
    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
    const feedUrl = rssFeeds[source];
    
    // CORS対策：別のプロキシを試す
    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
    const data = await response.json();
    
    if (data.items && data.items.length > 0) {
      const newsItems = data.items.slice(0, 15).map(item => {
        const date = new Date(item.pubDate);
        const timeText = formatTime(date);
        const description = item.description
          ? item.description.replace(/<[^>]*>/g, '').substring(0, 100)
          : '詳細はリンク先をご覧ください';
        
        return `
          <a href="${item.link}" target="_blank" class="news-item">
            <div class="news-source">${sourceNames[source]}</div>
            <div class="news-title">${item.title}</div>
            <div class="news-description">${description}...</div>
            <div class="news-meta">
              <div class="news-time">
                <span>🕐 ${timeText}</span>
              </div>
              <div class="read-more">続きを読む →</div>
            </div>
          </a>
        `;
      }).join('');
      
      display.innerHTML = `<div class="news-list">${newsItems}</div>`;
    } else {
      display.innerHTML = '<div class="error">ニュースの取得に失敗しました。しばらく後でお試しください。</div>';
    }
  } catch (error) {
    display.innerHTML = '<div class="error">ニュースの読み込みに失敗しました。<br>インターネット接続を確認してください。</div>';
  }
}

function formatTime(date) {
  const now = new Date();
  const diff = now - date;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  
  if (minutes < 60) return `${minutes}分前`;
  if (hours < 24) return `${hours}時間前`;
  if (days < 7) return `${days}日前`;
  
  const month = date.getMonth() + 1;
  const day = date.getDate();
  return `${month}月${day}日`;
}

// ページ読み込み時にニュースを取得
window.addEventListener('load', () => fetchNews(currentSource));
</script>
</body>
</html>
