<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Takashi Creater | Travel</title>
<meta name="keywords" content="travel, tourism, 旅行">
<meta name="description" content="世界の旅行スポット集">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: #f5f5f5;
  color: #333;
}
.travel-app {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px clamp(12px, 2vw, 28px);
}
.header {
  background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 50%, #c92a2a 100%);
  color: white;
  padding: 40px 20px;
  border-radius: 16px;
  margin-bottom: 30px;
  text-align: center;
}
.header h1 {
  font-size: 32px;
  font-weight: 300;
  margin-bottom: 8px;
}
.header p {
  font-size: 14px;
  opacity: 0.9;
}
.category-filter {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 20px;
  padding-bottom: 10px;
  scrollbar-width: none;
}
.category-filter::-webkit-scrollbar {
  display: none;
}
.category-btn {
  flex-shrink: 0;
  padding: 10px 16px;
  border: 1px solid #ddd;
  border-radius: 20px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s;
  white-space: nowrap;
}
.category-btn:hover {
  border-color: #ff6b6b;
  color: #ff6b6b;
}
.category-btn.active {
  background: #ff6b6b;
  color: white;
  border-color: #ff6b6b;
}
.spots-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  align-items: start;
}
.spot-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  transition: all 0.3s;
  cursor: pointer;
}
.spot-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
  transform: translateY(-4px);
}
.spot-image {
  width: 100%;
  height: 200px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
}
.spot-content {
  padding: 20px clamp(12px, 2vw, 28px);
}
.spot-category {
  display: inline-block;
  font-size: 12px;
  color: #ff6b6b;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.spot-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #333;
}
.spot-location {
  font-size: 13px;
  color: #999;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.spot-description {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
  margin-bottom: 16px;
}
.spot-highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.highlight {
  display: inline-block;
  padding: 6px 12px;
  background: #f5f5f5;
  border-radius: 12px;
  font-size: 12px;
  color: #666;
}
.spot-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid #f0f0f0;
}
.spot-rating {
  font-size: 14px;
  color: #ff6b6b;
}
.spot-link {
  color: #ff6b6b;
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.spot-link:hover {
  text-decoration: underline;
}
.back-link {
  text-align: center;
  margin-top: 30px;
  padding: 20px clamp(12px, 2vw, 28px);
}
.back-link a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 12px 24px;
  background: #ff6b6b;
  border: none;
  border-radius: 20px;
  display: inline-block;
  transition: all 0.3s;
  cursor: pointer;
}
.back-link a:hover {
  background: #ee5a6f;
  transform: scale(1.05);
}

@media (max-width: 768px) {
  .travel-app {
    max-width: 100%;
    padding: 14px;
  }
  .spots-list {
    grid-template-columns: 1fr;
    gap: 16px;
  }
}

</style>
</head>
<body>
<div class="travel-app">
  <div class="header">
    <h1>旅行スポット</h1>
    <p>世界のおすすめ観光地を探索</p>
  </div>
  
  <div class="category-filter">
    <button class="category-btn active" data-category="all">すべて</button>
    <button class="category-btn" data-category="asia">アジア</button>
    <button class="category-btn" data-category="europe">ヨーロッパ</button>
    <button class="category-btn" data-category="america">アメリカ大陸</button>
    <button class="category-btn" data-category="nature">自然</button>
    <button class="category-btn" data-category="culture">文化遺産</button>
  </div>
  
  <div class="spots-list" id="spots-list"></div>
  
  <div class="back-link">
    <a href="../">← ホームへ戻る</a>
  </div>
</div>

<script>
let spots = [];
let currentCategory = 'all';

// JSONファイルからスポットデータを読み込む
async function loadSpots() {
  try {
    const response = await fetch('spots.json');
    spots = await response.json();
    renderSpots();
  } catch (error) {
    console.error('スポットデータの読み込みに失敗しました:', error);
    document.getElementById('spots-list').innerHTML = '<p style="text-align:center;color:#999;">データの読み込みに失敗しました</p>';
  }
}

function renderSpots() {
  const spotsList = document.getElementById('spots-list');
  const filtered = currentCategory === 'all' 
    ? spots 
    : spots.filter(spot => spot.category === currentCategory);
  
  spotsList.innerHTML = filtered.map(spot => `
    <div class="spot-card">
      <div class="spot-image" style="background-image: url('${spot.image}');"></div>
      <div class="spot-content">
        <div class="spot-category">${spot.category.toUpperCase()}</div>
        <h2 class="spot-title">${spot.title}</h2>
        <div class="spot-location">📍 ${spot.location}</div>
        <p class="spot-description">${spot.description}</p>
        <div class="spot-highlights">
          ${spot.highlights.map(h => `<span class="highlight">${h}</span>`).join('')}
        </div>
        <div class="spot-footer">
          <div class="spot-rating">${spot.rating}</div>
          <a href="spot.html?id=${spot.slug}" class="spot-link">詳細を見る →</a>
        </div>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.category-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.category;
    renderSpots();
  });
});

window.addEventListener('load', loadSpots);
</script>
</body>
</html>
