<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Takashi Creater | Weather</title>
<meta name="keywords" content="weather, 天気">
<meta name="description" content="現在地の天気情報">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: linear-gradient(180deg, #4a90e2 0%, #7cb8f7 100%);
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}
.weather-app {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px;
}
.loading, .error {
  text-align: center;
  padding: 60px 20px;
  font-size: 18px;
}
.error {
  background: rgba(255, 50, 50, 0.2);
  border-radius: 16px;
  margin: 20px;
}
.location {
  text-align: center;
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 10px;
  font-weight: 400;
}
.current-weather {
  text-align: center;
  margin-bottom: 30px;
}
.city-name {
  font-size: 32px;
  font-weight: 300;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
.current-temp {
  font-size: 96px;
  font-weight: 200;
  line-height: 1;
  margin: 10px 0;
  letter-spacing: -2px;
}
.weather-condition {
  font-size: 20px;
  font-weight: 300;
  margin: 10px 0;
}
.temp-range {
  font-size: 18px;
  font-weight: 300;
  margin-top: 5px;
  opacity: 0.9;
}
.temp-range span {
  margin: 0 8px;
}
.weather-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}
.card-title {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hourly-forecast {
  display: flex;
  overflow-x: auto;
  gap: 16px;
  padding: 8px 0;
  scrollbar-width: none;
}
.hourly-forecast::-webkit-scrollbar {
  display: none;
}
.hourly-item {
  flex-shrink: 0;
  text-align: center;
  min-width: 60px;
}
.hourly-time {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 8px;
}
.hourly-icon {
  font-size: 28px;
  margin: 8px 0;
}
.hourly-temp {
  font-size: 18px;
  font-weight: 500;
}
.daily-forecast {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.daily-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.daily-day {
  flex: 1;
  font-size: 16px;
  font-weight: 400;
}
.daily-icon {
  font-size: 24px;
  flex: 0 0 40px;
  text-align: center;
}
.daily-temps {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  font-size: 16px;
}
.daily-temp-low {
  opacity: 0.6;
}
.daily-temp-bar {
  flex: 0 0 80px;
  height: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,200,100,0.8));
  border-radius: 2px;
  margin: 0 8px;
}
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.detail-item {
  text-align: left;
}
.detail-label {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 4px;
}
.detail-value {
  font-size: 24px;
  font-weight: 400;
}
.back-link {
  text-align: center;
  margin-top: 30px;
  padding: 20px;
}
.back-link a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  opacity: 0.8;
  padding: 12px 24px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  display: inline-block;
  transition: all 0.3s;
}
.back-link a:hover {
  opacity: 1;
  background: rgba(255, 255, 255, 0.25);
}
</style>
</head>
<body>
<div class="weather-app">
  <div id="weather-display" class="loading">
    位置情報を取得中...
  </div>
  
  <div class="back-link">
    <a href="home.html">← ホームへ戻る</a>
  </div>
</div>

<script>
function getWeather() {
  const display = document.getElementById('weather-display');
  
  if (!navigator.geolocation) {
    display.innerHTML = '<div class="error">位置情報がサポートされていません</div>';
    return;
  }
  
  navigator.geolocation.getCurrentPosition(
    position => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      fetchWeather(lat, lon);
    },
    error => {
      display.innerHTML = '<div class="error">位置情報の取得に失敗しました。<br><br>ブラウザの位置情報を許可してください。</div>';
    }
  );
}

async function fetchWeather(lat, lon) {
  const display = document.getElementById('weather-display');
  
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto&forecast_days=7`;
    const response = await fetch(url);
    const data = await response.json();
    
    const current = data.current;
    const hourly = data.hourly;
    const daily = data.daily;
    
    const cityName = await getCityName(lat, lon);
    
    // 現在時刻から次の6時間を取得
    const now = new Date();
    const currentHour = now.getHours();
    const hourlyItems = [];
    for (let i = 0; i < 6; i++) {
      const index = currentHour + i;
      if (index < 24 && hourly.time[index]) {
        const time = new Date(hourly.time[index]);
        hourlyItems.push({
          time: i === 0 ? '現在' : `${time.getHours()}時`,
          temp: Math.round(hourly.temperature_2m[index]),
          icon: getWeatherIcon(hourly.weather_code[index])
        });
      }
    }
    
    // 7日間予報
    const dailyItems = [];
    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    for (let i = 0; i < Math.min(7, daily.time.length); i++) {
      const date = new Date(daily.time[i]);
      const dayName = i === 0 ? '今日' : i === 1 ? '明日' : dayNames[date.getDay()];
      dailyItems.push({
        day: dayName,
        icon: getWeatherIcon(daily.weather_code[i]),
        max: Math.round(daily.temperature_2m_max[i]),
        min: Math.round(daily.temperature_2m_min[i])
      });
    }
    
    const todayMax = Math.round(daily.temperature_2m_max[0]);
    const todayMin = Math.round(daily.temperature_2m_min[0]);
    
    display.innerHTML = `
      <div class="location">現在地</div>
      <div class="current-weather">
        <div class="city-name">${cityName}</div>
        <div class="current-temp">${Math.round(current.temperature_2m)}°</div>
        <div class="weather-condition">${getWeatherDescription(current.weather_code)}</div>
        <div class="temp-range">
          <span>最高 ${todayMax}°</span>
          <span>最低 ${todayMin}°</span>
        </div>
      </div>
      
      <div class="weather-card">
        <div class="card-title">📅 1時間ごとの予報</div>
        <div class="hourly-forecast">
          ${hourlyItems.map(item => `
            <div class="hourly-item">
              <div class="hourly-time">${item.time}</div>
              <div class="hourly-icon">${item.icon}</div>
              <div class="hourly-temp">${item.temp}°</div>
            </div>
          `).join('')}
        </div>
      </div>
      
      <div class="weather-card">
        <div class="card-title">📆 7日間の天気予報</div>
        <div class="daily-forecast">
          ${dailyItems.map(item => `
            <div class="daily-item">
              <div class="daily-day">${item.day}</div>
              <div class="daily-icon">${item.icon}</div>
              <div class="daily-temps">
                <span class="daily-temp-low">${item.min}°</span>
                <div class="daily-temp-bar"></div>
                <span class="daily-temp-high">${item.max}°</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      
      <div class="weather-card">
        <div class="details-grid">
          <div class="detail-item">
            <div class="detail-label">湿度</div>
            <div class="detail-value">${current.relative_humidity_2m}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">風速</div>
            <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
          </div>
        </div>
      </div>
    `;
  } catch (error) {
    display.innerHTML = '<div class="error">天気情報の取得に失敗しました</div>';
  }
}

async function getCityName(lat, lon) {
  try {
    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`);
    const data = await response.json();
    return data.address.city || data.address.town || data.address.village || '現在地';
  } catch {
    return '現在地';
  }
}

function getWeatherDescription(code) {
  const weatherCodes = {
    0: '快晴', 1: '晴れ', 2: '一部曇り', 3: '曇り',
    45: '霧', 48: '霧氷',
    51: '小雨', 53: '雨', 55: '大雨',
    61: '弱い雨', 63: '雨', 65: '強い雨',
    71: '弱い雪', 73: '雪', 75: '大雪', 77: '霙',
    80: 'にわか雨', 81: '強いにわか雨', 82: '激しいにわか雨',
    85: 'にわか雪', 86: '強いにわか雪',
    95: '雷雨', 96: '雹を伴う雷雨', 99: '激しい雹を伴う雷雨'
  };
  return weatherCodes[code] || '不明';
}

function getWeatherIcon(code) {
  if (code === 0 || code === 1) return '☀️';
  if (code === 2) return '⛅';
  if (code === 3) return '☁️';
  if (code >= 51 && code <= 65) return '🌧️';
  if (code >= 71 && code <= 77) return '❄️';
  if (code >= 80 && code <= 82) return '🌦️';
  if (code >= 85 && code <= 86) return '🌨️';
  if (code >= 95) return '⛈️';
  return '🌤️';
}

window.addEventListener('load', getWeather);
</script>
</body>
</html>
